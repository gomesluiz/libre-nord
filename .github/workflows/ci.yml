name: Libre Nord CI/CD

on:
    push:
        branches: [ main, master, develop ]
        tags: [ 'v*']
    pull_request:
        branches: [ main, master, develop ]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:

        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install deps
              run: |
                sudo apt-get update
                sudo apt-get install -y --no-install-recommends zip libxml2-utils

            - name: Build extension (.oxt)
              run: make package

            - name: Upload realease asset
              uses: actions/upload-artifact@v4
              with:
                name: libre-nord-${{ github.sha }}
                path: '*.oxt'
                retention-days: 14

            - name: Create release on github
              if: github.ref_type == 'tag'
              uses: softprops/action-gh-release@v2
              with:
                files: '*.oxt'
                generate_release_notes: true
                draft: false
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}