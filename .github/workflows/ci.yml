name: Build Extensions

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Package All OXT Themes
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y make zip libxml2-utils

      - name: Build the extensions via Makefile
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            make release
          else
            make all
          fi

      - name: Upload .oxt files as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LibreOffice-Nord-Themes
          path: dist/*.oxt
          retention-days: 14

      - name: Publish Official Release (Tags Only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.oxt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}