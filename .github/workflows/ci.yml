name: Build LibreOffice Extensions

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Package All OXT Themes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y make zip libxml2-utils

      - name: Build the extensions via Makefile
        run: make all

      - name: Upload .oxt files as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LibreOffice-Nord-Themes
          path: dist/*.oxt
          retention-days: 14

      - name: Publish Official Release (Tags Only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.oxt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}