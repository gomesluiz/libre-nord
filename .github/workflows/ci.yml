name: Libre Nord CI/CD

on:
    push:
        branches: [ main, master, develop ]
        tags: [ 'v*']
    pull_request:
        branches: [ main, master, develop ]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    validate:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout code 
              uses: actions/checkout@v4

            - name: Install deps
              run: |
                sudo apt-get update
                sudo apt-get install -y --no-install-recommends zip libxml2-utils

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.10'
                cache: 'pip'

            - name: Generate icons
              run: python3 generate_icons.py

            - name: Build extension (.oxt)
              run: make package

            - name: Upload release asset
              uses: actions/upload-artifact@v4
              with:
                name: validation-logs-${{ github.sha }} 
                path: '*.xml'
                retention-days: 5
    build:
        needs: validate
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install deps
              run: |
                sudo apt-get update
                sudo apt-get install -y --no-install-recommends zip libxml2-utils

            - name: Setup Python
              uses: actions/setup-python@v5
              with: 
                python-version: '3.10'
                cache: 'pip'
            
            - name: Generate icons
              run: python3 generate_icons.py

            - name: Build extension (.oxt)
              run: make package

            - name: Upload realease asset
              uses: actions/upload-artifact@v4
              with:
                name: libre-nord-${{ github.sha }}
                path: '*.oxt'
                retention-days: 14

            - name: Create release on github
              if: github.ref_type == 'tag'
              uses: softprops/action-gh-release@v2
              with:
                files: '*.oxt'
                generate_release_notes: true
                draft: false
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}